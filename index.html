<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCOK OS | Plataforma Profissional</title>
    <link rel="stylesheet" href="style.css?v=21">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <div class="login-header"><span class="highlight">BLOCOK</span> OS<p>Acesso Restrito - Infraestrutura Google</p></div>
            <div class="form-group"><label>E-mail Corporativo:</label><input type="email" id="userInput" class="input-tech" placeholder="unidade@blocok.com"></div>
            <div class="form-group"><label>Senha de Acesso:</label><input type="password" id="passInput" class="input-tech" placeholder="******"></div>
            <button id="btnLogin" class="btn-tech-run">AUTENTICAR NO SERVIDOR</button>
            <p id="loginError" style="color: #ef4444; font-size: 12px; margin-top: 10px; display: none;">❌ Falha na autenticação da unidade!</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header-main">
            <div class="header-container">
                <div class="brand">
                    <h1><span class="highlight">BLOCOK</span> OS</h1>
                    <div class="badge-container">
                        <span id="nomeFranquia" class="badge-franquia">CARREGANDO...</span>
                        <p id="infoLogado" style="font-size: 11px; color: #94a3b8; margin: 0;"></p>
                    </div>
                </div>
                <button id="btnLogout" class="btn-tech-danger">🚪 Sair</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="painel-planta">
                <div class="controles-planta">
                    <label class="btn-tech">📁 Planta<input type="file" id="uploadPlanta" accept="image/*" style="display:none;"></label>
                    <button id="btnCalibrar" class="btn-tech" disabled>📐 Calibrar</button>
                    <button id="btnMedir" class="btn-tech" disabled>🎯 Medir</button>
                    <button id="btnLimpar" class="btn-tech-danger">🗑️ Limpar</button>
                </div>
                <div class="status-bar" id="statusBar">Conectado à Nuvem Segura</div>
                <div class="canvas-container"><canvas id="areaDesenho"></canvas></div>
            </div>

            <div class="painel-calculadora container">
                <div class="controle-insercao" style="border-left: 4px solid #10b981;">
                    <label class="titulo-secao">☁️ GERENCIADOR DA UNIDADE</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="nomeProjetoAtivo" class="input-tech" placeholder="Nome da Obra">
                        <button id="btnSalvarProjeto" class="btn-tech-primary">💾 Salvar</button>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <select id="selectProjetos" class="input-tech"><option value="">Buscando obras...</option></select>
                        <button id="btnCarregarProjeto" class="btn-tech">📂 Abrir</button>
                        <button id="btnExcluirProjeto" class="btn-tech-danger">❌</button>
                    </div>
                </div>

                <div id="painelAdmin" class="controle-insercao" style="display: none; border-left: 4px solid #f59e0b;">
                    <label class="titulo-secao">⚙️ PAINEL ADMINISTRATIVO</label>
                    <p style="font-size: 10px; color: #94a3b8; margin-bottom: 10px;">Edite os preços da unidade no Firebase Console.</p>
                    <button id="btnAbrirConfig" class="btn-tech" style="width: 100%;">Acessar Tabelas de Preço</button>
                </div>

                <div class="controle-insercao">
                    <label class="titulo-secao">1. SELEÇÃO DE MATERIAL</label>
                    <select id="espessuraCorrente" class="input-tech">
                        <option value="10">Bloco 10 cm</option><option value="13">Bloco 13 cm</option><option value="15">Bloco 15 cm</option><option value="20">Bloco 20 cm</option>
                    </select>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="number" id="comprimentoManual" class="input-tech" placeholder="Comp. (m)">
                        <button id="btnAdicionarManual" class="btn-tech-primary">Add</button>
                    </div>
                </div>

                <div class="lista-paredes"><table><thead><tr><th>ID</th><th>Medida</th><th>Esp.</th><th>Ação</th></tr></thead><tbody id="corpoTabela"></tbody></table></div>

                <form id="formCalculadora" class="controle-insercao">
                    <label class="titulo-secao">DADOS DO FECHAMENTO</label>
                    <input type="text" id="whatsappCliente" class="input-tech" placeholder="WhatsApp do Cliente">
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <div style="flex: 1;"><label style="font-size:10px;">Altura (m):</label><input type="number" id="alturaGlobal" class="input-tech" value="2.80" step="0.1"></div>
                        <div style="flex: 1;"><label style="font-size:10px;">Pagamento:</label><select id="formaPagamento" class="input-tech"><option value="avista">À Vista</option><option value="prazo">A Prazo</option></select></div>
                    </div>
                    <button type="submit" class="btn-tech-run" style="margin-top: 15px;">🚀 GERAR PROPOSTA COMERCIAL</button>
                </form>

                <div id="caixaResultado" class="resultado-box" style="display: none;"></div>
            </div>
        </div>
    </div>
    <script src="script.js?v=21"></script>
</body>
</html>
