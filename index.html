<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCOK OS | Sistema Blindado</title>
    <link rel="stylesheet" href="style.css?v=12">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <div class="login-header">
                <span class="highlight">BLOCOK</span> OS
                <p>Login de Segurança Google</p>
            </div>
            <div class="form-group">
                <label>E-mail de Acesso:</label>
                <input type="email" id="userInput" class="input-tech" placeholder="exemplo@email.com">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="passInput" class="input-tech" placeholder="******">
            </div>
            <button id="btnLogin" class="btn-tech-run">AUTENTICAR NO SERVIDOR</button>
            <p id="loginError" style="color: #ef4444; font-size: 12px; margin-top: 10px; display: none;">❌ Acesso negado pela nuvem!</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="header-main">
            <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 0 20px;">
                <div style="text-align: left;">
                    <h1><span class="highlight">BLOCOK</span> OS</h1>
                    <p id="infoLogado" style="font-size: 12px; color: #10b981;">Conectado como: ...</p>
                </div>
                <button id="btnLogout" class="btn-tech-danger" style="width: auto; padding: 10px 20px;">🚪 Sair com Segurança</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="painel-planta">
                <div class="controles-planta">
                    <label class="btn-tech">📁 Carregar Planta<input type="file" id="uploadPlanta" accept="image/png, image/jpeg" style="display:none;"></label>
                    <button id="btnCalibrar" class="btn-tech" disabled>📐 1. Calibrar</button>
                    <button id="btnMedir" class="btn-tech" disabled>🎯 2. Medir</button>
                    <button id="btnLimpar" class="btn-tech-danger">🗑️ Limpar</button>
                </div>
                <div class="status-bar" id="statusBar">Conectando ao banco de dados...</div>
                <div class="canvas-container"><canvas id="areaDesenho"></canvas></div>
            </div>

            <div class="painel-calculadora container">
                <!-- Gerenciador de Obras -->
                <div class="controle-insercao" style="border-left-color: #10b981; background: #0f1c18;">
                    <label class="titulo-secao" style="color: #10b981;">☁️ NUVEM E GERENCIADOR</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="nomeProjetoAtivo" class="input-tech" placeholder="Nome do Cliente / Obra">
                        <button type="button" id="btnSalvarProjeto" class="btn-tech-primary" style="background: #10b981;">💾 Salvar</button>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <select id="selectProjetos" class="input-tech" style="flex: 2;"><option value="">Carregando...</option></select>
                        <button type="button" id="btnCarregarProjeto" class="btn-tech" style="flex: 1;">📂 Abrir</button>
                        <button type="button" id="btnExcluirProjeto" class="btn-tech-danger" style="width: auto;">❌</button>
                    </div>
                </div>

                <!-- Painel Admin -->
                <div id="painelAdmin" class="controle-insercao" style="display: none; border-left-color: #f59e0b; background: #1a150b;">
                    <label class="titulo-secao" style="color: #f59e0b;">⚙️ PAINEL DO DONO</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label style="font-size:10px;">B10 (V/P)</label><div style="display:flex;gap:2px;"><input type="number" id="p10v" class="input-tech"><input type="number" id="p10p" class="input-tech"></div></div>
                        <div><label style="font-size:10px;">B13 (V/P)</label><div style="display:flex;gap:2px;"><input type="number" id="p13v" class="input-tech"><input type="number" id="p13p" class="input-tech"></div></div>
                        <div><label style="font-size:10px;">B15 (V/P)</label><div style="display:flex;gap:2px;"><input type="number" id="p15v" class="input-tech"><input type="number" id="p15p" class="input-tech"></div></div>
                        <div><label style="font-size:10px;">B20 (V/P)</label><div style="display:flex;gap:2px;"><input type="number" id="p20v" class="input-tech"><input type="number" id="p20p" class="input-tech"></div></div>
                    </div>
                    <button id="btnSalvarPrecosGlobais" class="btn-tech-primary" style="background: #f59e0b; margin-top: 10px;">💾 SALVAR PREÇOS GLOBAIS</button>
                    
                    <div style="margin-top: 20px; border-top: 1px dashed #334155; padding-top: 10px;">
                        <label class="titulo-secao" style="color: #3b82f6;">👥 GESTÃO DE ACESSOS</label>
                        <p style="font-size: 10px; color: #94a3b8;">Cadastre os e-mails da sua equipe abaixo.</p>
                        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                            <input type="email" id="novoEmailVend" class="input-tech" placeholder="E-mail do vendedor">
                            <input type="text" id="novaSenhaVend" class="input-tech" placeholder="Senha">
                            <button id="btnAddVendedor" class="btn-tech-primary" style="background: #3b82f6;">+</button>
                        </div>
                        <div class="lista-paredes" style="max-height: 100px;"><table id="tabVendedores"></table></div>
                    </div>
                </div>

                <!-- Formulário de Medição -->
                <div class="controle-insercao">
                    <label class="titulo-secao">1. CONFIGURAÇÃO DE PAREDES</label>
                    <select id="espessuraCorrente" class="input-tech save-state">
                        <option value="10">Bloco 10 cm</option><option value="13">Bloco 13 cm</option><option value="15">Bloco 15 cm</option><option value="20">Bloco 20 cm</option>
                    </select>
                    <div class="insercao-manual" style="margin-top:10px;">
                        <input type="number" id="comprimentoManual" class="input-tech" placeholder="Parede (m)">
                        <button id="btnAdicionarManual" class="btn-tech-primary">Add</button>
                    </div>
                </div>

                <div class="lista-paredes"><table><thead><tr><th>ID</th><th>Medida</th><th>Esp.</th><th>Ação</th></tr></thead><tbody id="corpoTabela"></tbody></table></div>

                <form id="formCalculadora" class="controle-insercao">
                    <label class="titulo-secao">DADOS DO CLIENTE E FECHAMENTO</label>
                    <input type="text" id="whatsappCliente" class="input-tech save-state" placeholder="WhatsApp (DDD + Número)">
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <div style="flex: 1;"><label style="font-size: 11px;">Frete (R$):</label><input type="number" id="valorFrete" class="input-tech" value="0"></div>
                        <div style="flex: 1;"><label style="font-size: 11px;">Desc (%):</label><input type="number" id="valorDesconto" class="input-tech" value="0"></div>
                    </div>
                    <button type="submit" class="btn-tech-run" style="margin-top: 15px;">🚀 GERAR PROPOSTA</button>
                </form>

                <div id="caixaResultado" class="resultado-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Bibliotecas Google Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="script.js?v=12"></script>
</body>
</html>
